<!DOCTYPE html>
<html lang="jp" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send BigSticker</title>
  <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
  <script type="text/javascript">
    document.addEventListener("DOMContentLoaded", () => {
      liff
        .init({
          liffId: '1656316634-yQgaXE5q'
        })
        .then(() => {
          const accessToken = liff.getAccessToken()
          alert(accessToken)
          document.getElementById('log').value = accessToken
        })
        .catch((err) => {
          document.getElementById('log').value = 'init ng\n' + err;
          alert("initialization failed")
        });
    });
  </script>
</head>

<body>
  <div>
    <h3>sendMessage</h3>
    <textarea id="log" placeholder="Log" style="width:96%;height:100px;"></textarea>
  </div>
</body>

</html>
