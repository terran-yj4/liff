<!DOCTYPE html>
<html lang="jp" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get User Data</title>
  <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
  <script type="text/javascript">
    document.addEventListener("DOMContentLoaded", () => {
      liff
        .init({
          liffId: '1656316634-yQgaXE5q'
        })
        .then(() => {
          const context = liff.getContext();
          const accessToken = liff.getAccessToken()
          document.getElementById('log').value = accessToken
          document.getElementById('context').value = JSON.stringify(context)
        })
        .catch((err) => {
          document.getElementById('log').value = 'init ng\n' + err;
          alert("initialization failed")
        });
    });
    const copyAT = () => {
      var at = document.getElementById("log");
      var text = document.createElement("textarea");
      text.value = at.dataset.copy_clipboard;
      document.body.appendChild(text);
      text.select();
      document.execCommand("copy");
      document.body.removeChild(text)
    }
  </script>
</head>

<body>
  <div>
    <h3>accessToken</h3>
    <input type="button" value="copyAccessToken" onclick="copyAT()">
    <textarea id="log" placeholder="Log" style="width:96%;height:100px;"></textarea>
  </div>
  <div>
    <h3>context</h3>
    <textarea id="context" placeholder="Log" style="width:96%;height:100px;"></textarea>
  </div>
</body>

</html>
