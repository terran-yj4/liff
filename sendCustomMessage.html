<!DOCTYPE html>
<html lang="jp" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SendCustomMessageV2</title>
  <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
  <script type="text/javascript">
    // URLを取得
    let url = new URL(window.location.href);
    // URLSearchParamsオブジェクトを取得
    let params = url.searchParams;
    // それぞれのパラメータを変数に代入
    let type = params.get('type')

    var sendMessage = (content) => {
      liff
        .init({
          liffId: '1656316634-09bXLKaV'
        })
        .then(() => {
          liff.sendMessages([
            content
          ])
            .then(function () {
              document.getElementById('log').value += 'sendMessages completed\n';
              liff.closeWindow()
            }).catch(function (error) {
              document.getElementById('log').value += 'sendMessagesText()=' + error + '\n';
              alert("トークルームが開かれていないか\nURLパラメータに誤りがあります。\n送信先ルーム及び、リンクを確認し\n再度実行してください。\n\n" + error)
            });
        })
        .catch((err) => {
          document.getElementById('log').value = 'init ng\n' + err;
          alert("initialization failed")
          liff.closeWindow()
        });
    }

    // ページをロードした時に動く
    document.addEventListener("DOMContentLoaded", () => {

      if (type == "txt") {
        let txt = params.get('txt')
        let content = {
          "type": "text",
          "text": txt
        }
        sendMessage(content)
      }

      if (type == "stk") {
        let stk = params.get('stk')
        let sid = params.get('sid')
        let pkgid = params.get('pkg')
        let imgurl = "https://stickershop.line-scdn.net/stickershop/v1/sticker/" + sid + "/iPhone/sticker@2x.png"
        let link = "https://line.me/S/sticker/" + pkgid
        if (stk == "anim") {
          imgurl = "https://stickershop.line-scdn.net/stickershop/v1/sticker/" + sid + "/iPhone/sticker_animation@2x.png"
        }
        let content = {
          "type": "template",
          "altText": "BigStickerが送信されました",
          "template": {
            "type": "image_carousel",
            "columns": [
              {
                "imageUrl": imgurl,
                "action": {
                  "type": "uri",
                  "uri": link
                }
              }
            ]
          }
        }
        sendMessage(content)
      }

      if (type == undefined) {
        alert("")
      }
    });

    var sendImage = () => {
      let imgUrl = document.getElementById("sendImage_imageUrl").value
      liff
        .init({
          liffId: '1656316634-09bXLKaV'
        })
        .then(() => {
          liff.sendMessages([
            {
              "type": "template",
              "altText": "写真が送信されました",
              "template": {
                "type": "image_carousel",
                "columns": [
                  {
                    "imageUrl": imgUrl
                  }
                ]
              }
            }
          ])
            .then(function () {
              document.getElementById('log').value += 'sendMessagesFlex completed\n';
              liff.closeWindow()
            }).catch(function (error) {
              document.getElementById('log').value += 'sendMessagesText()=' + error + '\n';
              alert("トークルームが開かれていないか\nURLパラメータに誤りがあります。\n送信先ルーム及び、リンクを確認し\n再度実行してください。\n\n" + error)
              liff.closeWindow()
            });
        })
        .catch((err) => {
          document.getElementById('log').value = 'init ng\n' + err;
          alert("initialization failed")
          liff.closeWindow()
        })
    }
  </script>
</head>

<body>
  <div>
    <h3>sendMessage</h3>
    <input type="button" id="go" class="btn btn--orange btn--radius" value="実行" />
    <textarea id="log" placeholder="Log" style="width:96%;height:100px;"></textarea>
    <p><br></p>
    <input type="button" value="sendImage" onclick="sendImage()">
    <textarea id="sendImage_imageUrl" placeholder="image_url" style="width:96%;height:50px;"></textarea>
  </div>
  <style>
    .btn--orange,
    a.btn--orange {
      color: #fff;
      background-color: #eb6100;
    }

    .btn--orange:hover,
    a.btn--orange:hover {
      color: #fff;
      background: #f56500;
    }

    a.btn--radius {
      border-radius: 100vh;
    }
  </style>
</body>

</html>
