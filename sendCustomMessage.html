<!DOCTYPE html>
<html lang="jp" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>SendCustomMessageV2</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const resetDisplay = () => {
      [
        'ttlBox', 'txtBox', 'altTxtBox', 'urlBox', 'previewImgUrlBox', 'stkBox',
        'sidBox', 'pkgBox', 'footerTxtBox', 'footerUrlBox', 'footerIconUrlBox', 'jsonBox'
      ].forEach(id => document.getElementById(id).style.display = 'none');
    };

    const setDisplay = (id) => document.getElementById(id).style.display = '';
    const setFooterDisplay = () => ['footerTxtBox', 'footerUrlBox', 'footerIconUrlBox'].forEach(setDisplay);

    const sendMessage = () => {
      const type = document.getElementById("messageType").value;
      const messageData = {
        txt: document.getElementById("txt").value,
        title: document.getElementById("ttl").value,
        altTxt: document.getElementById("altTxt").value,
        url: document.getElementById("url").value,
        piu: document.getElementById("previewImgUrl").value,
        stk: document.getElementById("stk").value,
        sid: document.getElementById("sid").value,
        pkg: document.getElementById("pkg").value,
        ft: document.getElementById("footerTxt").value,
        fu: document.getElementById("footerUrl").value,
        fi: document.getElementById("footerIconUrl").value,
        json: document.getElementById("json").value
      };

      let content;
      switch (type) {
        case "txt":
          content = { type: "text", text: messageData.txt };
          break;
        case "stk":
          const imgurl = `https://stickershop.line-scdn.net/stickershop/v1/sticker/${messageData.sid}/iPhone/sticker@2x.png`;
          content = {
            type: "flex",
            altText: "BigStickerが送信されました",
            contents: {
              type: "bubble",
              size: "mega",
              hero: { type: "image", url: imgurl, size: "100%", aspectRatio: "1:1" },
              action: { type: "uri", label: "action", uri: `https://line.me/S/sticker/${messageData.pkg}` }
            }
          };
          break;
        case "image":
          content = {
            type: "carousel",
            contents: [{ type: "bubble", size: "giga", hero: { type: "image", url: messageData.url, size: "full", aspectRatio: "1:1", aspectMode: "cover" } }]
          };
          break;
        case "video":
          content = { type: "video", originalContentUrl: messageData.url, previewImageUrl: messageData.piu };
          break;
        case "json":
          content = JSON.parse(messageData.json);
          break;
      }

      if (content) {
        liff.init({ liffId: '1656316634-09bXLKaV' }).then(() => {
          liff.sendMessages([content]).then(() => liff.closeWindow()).catch(err => alert("送信エラー:\n" + err));
        }).catch(err => alert("LIFF初期化エラー:\n" + err));
      }
    };

    const valueChange = () => {
      resetDisplay();
      const type = document.getElementById("messageType").value;
      switch (type) {
        case "txt": setDisplay('txtBox'); setFooterDisplay(); break;
        case "stk": ['stkBox', 'sidBox', 'pkgBox'].forEach(setDisplay); setFooterDisplay(); break;
        case "image": setDisplay('urlBox'); setFooterDisplay(); break;
        case "video": ['urlBox', 'previewImgUrlBox'].forEach(setDisplay); setFooterDisplay(); break;
        case "json": setDisplay('jsonBox'); break;
      }
    };
  </script>
</head>
<body>
  <h3>sendMessage ver.2.5.1</h3>
  <select id="messageType" name="messageType" onchange="valueChange();">
    <option hidden>メッセージタイプを選択</option>
    <option value="txt">Txt</option>
    <option value="stk">Sticker</option>
    <option value="image">Image</option>
    <option value="video">Video</option>
    <option value="json">Json</option>
  </select>
  <button onclick="sendMessage()">実行</button>
  <div id="txtBox" style="display:none;"><p>テキスト</p><textarea id="txt"></textarea></div>
  <div id="stkBox" style="display:none;"><p>sticker</p><textarea id="stk"></textarea></div>
  <div id="urlBox" style="display:none;"><p>URL</p><textarea id="url"></textarea></div>
  <div id="previewImgUrlBox" style="display:none;"><p>プレビュー画像</p><textarea id="previewImgUrl"></textarea></div>
  <div id="footerTxtBox" style="display:none;"><p>フッターテキスト</p><textarea id="footerTxt"></textarea></div>
</body>
</html>
